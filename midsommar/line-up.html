<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Design Project</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/lineUp.css" />
  </head>
  <body>

<section class="lineup-section">
    <div class="day-header">
        <h2>LINE-UP</h2>
        <p>friday 10th july</p>
    </div>

    <div class="artist-grid" id="friday-grid">
        <div class="artist-card">
            <img src="images/zaraLarsson.jpg" alt="Zara Larsson">
            <h3>ZARA LARSSON</h3>
        </div>
        <div class="artist-card">
            <img src="images/mollySandén.jpg" alt="Molly Sandén">
            <h3>MOLLY SANDÉN</h3>
        </div>
        <div class="artist-card">
            <img src="images/HarryStyles.jpg" alt="Harry Styles">
            <h3>HARRY STYLES</h3>
        </div>
        <div class="artist-card">
            <img src="images/Shakira.jpg" alt="Shakira">
            <h3>SHAKIRA</h3>
        </div>

        <div class="artist-card hidden">
            <img src="images/PinkPantheress.jpg" alt="Artist Pink Pantheress">
            <h3>PINK PANTHERESS</h3>
        </div>
    </div>

    <button class="see-more-btn" onclick="showMore('friday-grid')">SEE MORE</button>
</section>
  </body>
</html>
